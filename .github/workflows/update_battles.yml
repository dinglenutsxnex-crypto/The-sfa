name: Update Battle Data

on:
  schedule:
    # Run daily at 06:00 UTC so the table is fresh each day
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch, decrypt and parse battle data
        run: python scripts/extract_battles.py

      - name: Commit updated battles.json (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/battles.json
          git diff --staged --quiet \
            && echo "No changes — battles.json is already up to date." \
            || git commit -m "chore: update battle data [skip ci]" && git push
